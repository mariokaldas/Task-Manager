<main class="container">
    <div class="row align-items-end mb-5 g-4">
        <div class="col-md-7">
            <h1 class="display-6 fw-bold" style="color: var(--primary-theme);">Tasks</h1>
            <p class="mb-0" style="color: var(--on-surface-variant);">Manage and track your ongoing work.</p>
        </div>
        <div class="col-md-5 d-flex gap-2 justify-content-md-end">
            <button class="btn btn-outline-custom d-flex align-items-center gap-2" (click)="sortByDate()">
                <span class="material-symbols-outlined fs-5">calendar_today</span> Sort by Date
            </button>
            <button class="btn btn-outline-custom d-flex align-items-center gap-2" (click)="sortByPriority()">
                <span class="material-symbols-outlined fs-5">flag</span> Sort by Priority
            </button>
        </div>
    </div>

    <ul class="nav nav-tabs mb-4 gap-4">
        <li class="nav-item"><a class="nav-link" routerLink="../all" routerLinkActive="active">All Tasks</a></li>
        <li class="nav-item"><a class="nav-link" routerLink="../todo" routerLinkActive="active">To-Do</a></li>
        <li class="nav-item"><a class="nav-link" routerLink="../done" routerLinkActive="active">Done</a></li>
    </ul>

    <div class="list">
        @for(c of listToDisplay(); track c.id){
        <app-task-card [card]="c" class="taskcard"></app-task-card>
        }
    </div>
</main>
