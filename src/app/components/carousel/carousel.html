<main class="container-xl py-5 flex-grow-1">
  <section id="heroCarousel" class="carousel slide shadow-lg" data-bs-ride="carousel">
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="0" class="active"></button>
      <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="1"></button>
      <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="2"></button>
    </div>
    <div class="carousel-inner border border-secondary rounded-4">
      <div class="carousel-item active">
        <img src="/carousel/carousel1.png" class="d-block w-100" alt="Teamwork">
      </div>
      <div class="carousel-item">
        <img src="/carousel/carousel3.png" class="d-block w-100" alt="Task UI">
      </div>
      <div class="carousel-item">
        <img src="/carousel/carousel2.png" class="d-block w-100" alt="Focus">
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
    </button>
  </section>
</main>
